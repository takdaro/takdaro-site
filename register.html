<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت نام | تک دارو</title>
  <meta name="description" content="ایجاد حساب کاربری در تک دارو" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    body {
      margin: 0;
      background: #f6f7fb;
      color: #1f2937;
      font-family: "Shabnam", sans-serif;
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px;
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
    }

    .auth-subtitle {
      margin: 0 0 24px;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
    }

    .auth-form {
      display: grid;
      gap: 16px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      height: 48px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      box-sizing: border-box;
      background: #fff;
      outline: none;
    }

    .form-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .auth-button {
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .auth-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .auth-message {
      display: none;
      min-height: 24px;
      font-size: 14px;
      text-align: center;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .auth-message.is-error {
      display: block;
      color: #dc2626;
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.16);
    }

    .auth-message.is-success {
      display: block;
      color: #16a34a;
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid rgba(22, 163, 74, 0.16);
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">ایجاد حساب کاربری</h1>
      <p class="auth-subtitle">برای ادامه، اطلاعات خود را وارد کنید.</p>

      <form id="register-form" class="auth-form" novalidate>
        <div class="auth-message" data-auth-message></div>

        <div class="form-group">
          <label class="form-label" for="full_name">نام و نام خانوادگی</label>
          <input
            id="full_name"
            name="full_name"
            class="form-input"
            type="text"
            placeholder="مثلاً علی رضایی"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">ایمیل</label>
          <input
            id="email"
            name="email"
            class="form-input"
            type="email"
            placeholder="example@mail.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">رمز عبور</label>
          <input
            id="password"
            name="password"
            class="form-input"
            type="password"
            placeholder="حداقل 6 کاراکتر"
            required
          />
        </div>

        <button class="auth-button" type="submit">ثبت نام</button>
      </form>

      <div class="auth-footer">
        قبلاً حساب ساخته‌ای؟
        <a href="./login.html">ورود</a>
      </div>
    </section>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      if (!window.Auth) return;

      await window.Auth.redirectIfAuthenticated({
        redirectTo: "/account.html"
      });

      window.Auth.bindRegisterForm({
        formSelector: "#register-form",
        messageSelector: "[data-auth-message]",
        redirectAfterSuccess: "/login.html"
      });
    });
  </script>
</body>
</html>
