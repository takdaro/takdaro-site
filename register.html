<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت نام | تک دارو</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
  <style>
    body {
      margin: 0;
      background: #f6f7fb;
      color: #1f2937;
      font-family: "Shabnam", sans-serif;
    }
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 28px;
    }
    .auth-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
    }
    .auth-subtitle {
      margin: 0 0 24px;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
    }
    .auth-form {
      display: grid;
      gap: 16px;
    }
    .form-group {
      display: grid;
      gap: 8px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 600;
    }
    .form-input {
      width: 100%;
      height: 48px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      box-sizing: border-box;
      background: #fff;
      outline: none;
    }
    .form-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .auth-button {
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .auth-button:disabled {
      opacity: .7;
      cursor: not-allowed;
    }
    .auth-message {
      min-height: 24px;
      font-size: 14px;
      text-align: center;
    }
    .auth-message.error {
      color: #dc2626;
    }
    .auth-message.success {
      color: #16a34a;
    }
    .auth-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }
    .auth-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">ایجاد حساب کاربری</h1>
      <p class="auth-subtitle">برای ادامه، اطلاعات خود را وارد کنید.</p>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="full_name">نام و نام خانوادگی</label>
          <input id="full_name" name="full_name" class="form-input" type="text" placeholder="مثلاً علی رضایی" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">ایمیل</label>
          <input id="email" name="email" class="form-input" type="email" placeholder="example@mail.com" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">رمز عبور</label>
          <input id="password" name="password" class="form-input" type="password" placeholder="حداقل 6 کاراکتر" required />
        </div>

        <button id="registerButton" class="auth-button" type="submit">ثبت نام</button>
        <div id="registerMessage" class="auth-message"></div>
      </form>

      <div class="auth-footer">
        قبلاً حساب ساخته‌ای؟
        <a href="./login.html">ورود</a>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("registerForm");
    const button = document.getElementById("registerButton");
    const message = document.getElementById("registerMessage");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      message.className = "auth-message";
      message.textContent = "";

      const full_name = document.getElementById("full_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!full_name || !email || !password) {
        message.className = "auth-message error";
        message.textContent = "همه فیلدها الزامی هستند.";
        return;
      }

      if (password.length < 6) {
        message.className = "auth-message error";
        message.textContent = "رمز عبور باید حداقل 6 کاراکتر باشد.";
        return;
      }

      button.disabled = true;
      button.textContent = "در حال ثبت نام...";

      try {
        const response = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ full_name, email, password })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "ثبت نام انجام نشد.");
        }

        message.className = "auth-message success";
        message.textContent = "ثبت نام با موفقیت انجام شد. در حال انتقال به صفحه ورود...";
        form.reset();

        setTimeout(() => {
          window.location.href = "./login.html";
        }, 1200);
      } catch (error) {
        message.className = "auth-message error";
        message.textContent = error.message || "خطا در ثبت نام.";
      } finally {
        button.disabled = false;
        button.textContent = "ثبت نام";
      }
    });
  </script>
</body>
</html>
