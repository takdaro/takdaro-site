<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود | تک تجارت</title>
  <meta name="description" content="ورود کاربران به حساب کاربری تک تجارت" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .auth-section {
      padding: 48px 0;
    }

    .auth-shell {
      max-width: 520px;
      margin: 0 auto;
    }

    .auth-card {
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .auth-card__head {
      padding: 24px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .auth-card__head h1 {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 1.4rem;
    }

    .auth-card__head p {
      margin: 0;
      color: #64748b;
      line-height: 1.9;
      font-size: 0.95rem;
    }

    .auth-card__body {
      padding: 24px;
    }

    .auth-form {
      display: grid;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field label {
      font-weight: 700;
      color: #334155;
      font-size: 0.94rem;
    }

    .form-field input {
      width: 100%;
      border: 1px solid #dbe2ea;
      border-radius: 16px;
      background: #fff;
      padding: 14px 16px;
      font: inherit;
    }

    .form-field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .auth-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .auth-note {
      margin: 0;
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.9;
    }

    .auth-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(15, 23, 42, 0.06);
      text-align: center;
    }

    .auth-register-link {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.9;
    }

    .auth-register-link a {
      color: #1d4ed8;
      font-weight: 700;
      text-decoration: none;
    }

    .auth-register-link a:hover {
      text-decoration: underline;
    }

    .auth-message {
      display: none;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 0.92rem;
      line-height: 1.9;
    }

    .auth-message.is-error {
      display: block;
      background: rgba(220, 38, 38, 0.08);
      color: #b91c1c;
      border: 1px solid rgba(220, 38, 38, 0.16);
    }

    .auth-message.is-success {
      display: block;
      background: rgba(22, 163, 74, 0.08);
      color: #166534;
      border: 1px solid rgba(22, 163, 74, 0.16);
    }

    @media (max-width: 640px) {
      .auth-section {
        padding: 24px 0;
      }

      .auth-card__head,
      .auth-card__body {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero hero-compact">
      <div class="container">
        <div class="hero-content">
          <span class="hero-badge">ورود کاربران</span>
          <h1>ورود به حساب کاربری</h1>
          <p>برای مشاهده سفارش‌ها، کیف پول و اطلاعات حساب، وارد پنل کاربری خود شوید.</p>
        </div>
      </div>
    </section>

    <section class="auth-section">
      <div class="container">
        <div class="auth-shell">
          <div class="auth-card">
            <div class="auth-card__head">
              <h1>ورود</h1>
              <p>با ایمیل و رمز عبور خود وارد حساب کاربری شوید.</p>
            </div>

            <div class="auth-card__body">
              <form class="auth-form" id="login-form" novalidate>
                <div class="auth-message" data-auth-message></div>

                <div class="form-field">
                  <label for="login-identity">ایمیل</label>
                  <input
                    id="login-identity"
                    name="identity"
                    type="text"
                    placeholder="name@example.com"
                    autocomplete="username"
                    required
                  />
                </div>

                <div class="form-field">
                  <label for="login-password">رمز عبور</label>
                  <input
                    id="login-password"
                    name="password"
                    type="password"
                    placeholder="رمز عبور"
                    autocomplete="current-password"
                    required
                  />
                </div>

                <div class="auth-row">
                  <label class="auth-note">
                    <input type="checkbox" name="remember" />
                    مرا به خاطر بسپار
                  </label>
                  <a href="#" class="auth-note">بازیابی رمز عبور</a>
                </div>

                <div class="checkout-actions">
                  <button type="submit" class="btn btn-primary">ورود به حساب</button>
                  <a href="./register.html" class="btn btn-secondary">ایجاد حساب جدید</a>
                </div>

                <div class="auth-footer">
                  <p class="auth-note">
                    پس از ورود موفق، به حساب کاربری خود هدایت می‌شوید.
                  </p>
                  <p class="auth-register-link">
                    هنوز ثبت نام نکردی؟
                    <a href="./register.html">ثبت نام میکنم</a>
                  </p>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div id="site-cart"></div>

  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/products.js"></script>
  <script src="./price-overrides.js"></script>
  <script src="./price-loader.js"></script>
  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      if (!window.Auth) return;

      await window.Auth.redirectIfAuthenticated({
        redirectTo: "/account.html"
      });

      window.Auth.bindLoginForm({
        formSelector: "#login-form",
        messageSelector: "[data-auth-message]",
        redirectAfterSuccess: "/account.html"
      });
    });
  </script>
</body>
</html>
